    z-index: 10;

  #theme-annonce {

    font-weight: bold;

    border: none;
    border-radius: 8px;

    color: white;
    cursor: pointer;
    margin-bottom: 20px;

    margin-left: 8px;

    flex-direction: column;
    align-items: center;

const NOMS_THEMES = Object.keys(THEMES);
const COULEURS = ['#e74c3c','#e67e22','#f39c12','#27ae60','#16a085','#2980b9','#8e44ad','#c0392b','#d35400','#1abc9c'];

function dessinerRoue(angle) {
  const canvas = $("roue");
  const ctx = canvas.getContext("2d");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = cx - 6;
  const n = NOMS_THEMES.length;
  const arc = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  NOMS_THEMES.forEach(function(theme, i) {
    var startA = angle + i * arc;
    var endA = startA + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startA, endA);
    ctx.closePath();
    ctx.fillStyle = COULEURS[i];
    ctx.fill();
    ctx.strokeStyle = "#1e293b";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startA + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "white";
    ctx.font = "bold 12px Arial";
    ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.shadowBlur = 4;
    ctx.fillText(theme, r - 10, 5);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, 2 * Math.PI);
  ctx.fillStyle = "#1e293b";
  ctx.fill();
  ctx.strokeStyle = "#fbbf24";
  ctx.lineWidth = 3;
  ctx.stroke();
}
const ALPHABET = "AZERTYUIOPQSDFGHJKLMWXCVBN".split("");
const PARTIES_SOLO = ["s-tete","s-corps","s-brasG","s-brasD","s-jambeG","s-jambeD"];
const PARTIES_J1   = ["j1-tete","j1-corps","j1-brasG","j1-brasD","j1-jambeG","j1-jambeD"];
const PARTIES_J2   = ["j2-tete","j2-corps","j2-brasG","j2-brasD","j2-jambeG","j2-jambeD"];
const MAX_ERREURS  = 6;

let mode = 1;
let joueurActuel = 1;
let themeChoisi = "";
let motSolo = "", lettresSolo = [], erreursSolo = 0;
let motJ1 = "", motJ2 = "", lettresJ1 = [], lettresJ2 = [];
let erreursJ1 = 0, erreursJ2 = 0, scoreJ1 = 0, scoreJ2 = 0;
let finiJ1 = false, finiJ2 = false;

function $(id) { return document.getElementById(id); }

function retourAccueil() {
  ["setup-j1","setup-j2","jeu-solo","jeu-duo","roulette"].forEach(id => $(id).style.display = "none");
  $("rejouer").style.display = "none";
  $("choix-mode").style.display = "flex";
}

function choisirMode(m) {
  mode = m;
  $("choix-mode").style.display = "none";
  lancerRoulette();
}

function lancerRoulette() {
  $("roulette").style.display = "flex";
  $("theme-annonce").textContent = "";

  var indexFinal = Math.floor(Math.random() * NOMS_THEMES.length);
  var arc = (2 * Math.PI) / NOMS_THEMES.length;
  var targetAngle = -Math.PI / 2 - indexFinal * arc - arc / 2;
  var spins = 6 + Math.random() * 3;
  var finalAngle = targetAngle - spins * 2 * Math.PI;
  var startTime = null;
  var duration = 4500;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(timestamp) {
    if (!startTime) startTime = timestamp;
    var elapsed = timestamp - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var angle = finalAngle * easeOut(progress);
    dessinerRoue(angle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      themeChoisi = NOMS_THEMES[indexFinal];
      $("theme-annonce").textContent = themeChoisi;
      setTimeout(function() {
        $("roulette").style.display = "none";
        if (mode === 1) {
          $("jeu-solo").style.display = "flex";
          nouvellePartie();
        } else {
          motJ1 = motDuTheme("");
          motJ2 = motDuTheme(motJ1);
          $("jeu-duo").style.display = "flex";
          nouvellePartie();
        }
      }, 2000);
    }
  }

  dessinerRoue(0);
  requestAnimationFrame(animate);
}

function motDuTheme(exclure) {
  const liste = THEMES[themeChoisi] ? THEMES[themeChoisi].mots : THEMES[NOMS_THEMES[0]].mots;
  const filtres = liste.filter(m => m !== exclure);
  return filtres[Math.floor(Math.random() * filtres.length)];
}

function definition(mot) {
  return DEFINITIONS[mot] || "Aucune définition disponible.";
}

function nouvellePartie() {
  $("rejouer").style.display = "none";

  if (mode === 1) {
    motSolo = motDuTheme("");
    lettresSolo = [];
    erreursSolo = 0;
    PARTIES_SOLO.forEach(id => $(id).setAttribute("visibility","hidden"));
    $("message-solo").textContent = "";
    $("theme-solo").textContent = "Thème : " + themeChoisi;
    $("clavier-solo").innerHTML = "";
    ALPHABET.forEach(l => {
      const b = document.createElement("button");
      b.textContent = l; b.id = "s-" + l;
      b.onclick = () => proposerLettreSolo(l);
      $("clavier-solo").appendChild(b);
    });
    afficherMotSolo();

  } else {
    lettresJ1 = []; lettresJ2 = [];
    erreursJ1 = 0; erreursJ2 = 0;
    scoreJ1 = 0; scoreJ2 = 0;
    finiJ1 = false; finiJ2 = false;
    joueurActuel = 1;
    PARTIES_J1.forEach(id => $(id).setAttribute("visibility","hidden"));
    PARTIES_J2.forEach(id => $(id).setAttribute("visibility","hidden"));
    $("score-j1").textContent = "Score: 0";
    $("score-j2").textContent = "Score: 0";
    $("erreurs-j1").textContent = "Erreurs: 0/6";
    $("erreurs-j2").textContent = "Erreurs: 0/6";
    $("message-j1").textContent = "";
    $("message-j2").textContent = "";
    $("theme-j1").textContent = "Thème : " + themeChoisi;
    $("theme-j2").textContent = "Thème : " + themeChoisi;
    $("cote-j1").classList.add("actif");
    $("cote-j2").classList.remove("actif");

    $("clavier-j1").innerHTML = "";
    ALPHABET.forEach(l => {
      const b = document.createElement("button");
      b.textContent = l; b.id = "j1-" + l;
      b.onclick = () => proposerLettreDuo(1, l);
      $("clavier-j1").appendChild(b);
    });
    $("clavier-j2").innerHTML = "";
    ALPHABET.forEach(l => {
      const b = document.createElement("button");
      b.textContent = l; b.id = "j2-" + l;
      b.disabled = true;
      b.onclick = () => proposerLettreDuo(2, l);
      $("clavier-j2").appendChild(b);
    });
    afficherMotDuo();
  }
}

function afficherMotSolo() {
  $("mot-solo").textContent = [...motSolo].map(l => lettresSolo.includes(l) ? l : "_").join(" ");
}

function afficherMotDuo() {
  $("mot-j1").textContent = [...motJ1].map(l => lettresJ1.includes(l) ? l : "_").join(" ");
  $("mot-j2").textContent = [...motJ2].map(l => lettresJ2.includes(l) ? l : "_").join(" ");
}

function proposerLettreSolo(l) {
  const b = $("s-" + l);
  b.disabled = true;
  if (motSolo.includes(l)) {
    lettresSolo.push(l); b.classList.add("bonne");
  } else {
    $(PARTIES_SOLO[erreursSolo]).setAttribute("visibility","visible");
    erreursSolo++; b.classList.add("mauvaise");
  }
  afficherMotSolo();
  if ([...motSolo].every(l => lettresSolo.includes(l))) {
    $("message-solo").innerHTML = "✅ Gagné ! Le mot était <b>" + motSolo + "</b><br><span style='font-size:0.85rem;color:#94a3b8;'>📖 " + definition(motSolo) + "</span>";
    $("message-solo").style.color = "#16a34a";
    ALPHABET.forEach(l => $("s-" + l).disabled = true);
    $("rejouer").style.display = "block";
  } else if (erreursSolo >= MAX_ERREURS) {
    $("message-solo").innerHTML = "❌ Perdu ! Le mot était <b>" + motSolo + "</b><br><span style='font-size:0.85rem;color:#94a3b8;'>📖 " + definition(motSolo) + "</span>";
    $("message-solo").style.color = "#dc2626";
    ALPHABET.forEach(l => $("s-" + l).disabled = true);
    $("rejouer").style.display = "block";
  }
}

function proposerLettreDuo(joueur, l) {
  if (joueur !== joueurActuel) return;
  const b = $(joueur === 1 ? "j1-" + l : "j2-" + l);
  b.disabled = true;

  if (joueur === 1) {
    if (motJ1.includes(l)) {
      lettresJ1.push(l); b.classList.add("bonne");
      scoreJ1 += [...motJ1].filter(c => c === l).length;
      $("score-j1").textContent = "Score: " + scoreJ1;
    } else {
      $(PARTIES_J1[erreursJ1]).setAttribute("visibility","visible");
      erreursJ1++; b.classList.add("mauvaise");
      $("erreurs-j1").textContent = "Erreurs: " + erreursJ1 + "/6";
      changerTour();
    }
    if ([...motJ1].every(c => lettresJ1.includes(c))) {
      $("message-j1").innerHTML = "✅ Mot trouvé !<br><span style='font-size:0.75rem;color:#94a3b8;'>📖 " + definition(motJ1) + "</span>";
      $("message-j1").style.color = "#16a34a";
      finiJ1 = true; ALPHABET.forEach(l => $("j1-" + l).disabled = true); changerTour();
    } else if (erreursJ1 >= MAX_ERREURS) {
      $("message-j1").innerHTML = "❌ <b>" + motJ1 + "</b><br><span style='font-size:0.75rem;color:#94a3b8;'>📖 " + definition(motJ1) + "</span>";
      $("message-j1").style.color = "#dc2626";
      finiJ1 = true; ALPHABET.forEach(l => $("j1-" + l).disabled = true); changerTour();
    }
  } else {
    if (motJ2.includes(l)) {
      lettresJ2.push(l); b.classList.add("bonne");
      scoreJ2 += [...motJ2].filter(c => c === l).length;
      $("score-j2").textContent = "Score: " + scoreJ2;
    } else {
      $(PARTIES_J2[erreursJ2]).setAttribute("visibility","visible");
      erreursJ2++; b.classList.add("mauvaise");
      $("erreurs-j2").textContent = "Erreurs: " + erreursJ2 + "/6";
      changerTour();
    }
    if ([...motJ2].every(c => lettresJ2.includes(c))) {
      $("message-j2").innerHTML = "✅ Mot trouvé !<br><span style='font-size:0.75rem;color:#94a3b8;'>📖 " + definition(motJ2) + "</span>";
      $("message-j2").style.color = "#16a34a";
      finiJ2 = true; ALPHABET.forEach(l => $("j2-" + l).disabled = true); changerTour();
    } else if (erreursJ2 >= MAX_ERREURS) {
      $("message-j2").innerHTML = "❌ <b>" + motJ2 + "</b><br><span style='font-size:0.75rem;color:#94a3b8;'>📖 " + definition(motJ2) + "</span>";
      $("message-j2").style.color = "#dc2626";
      finiJ2 = true; ALPHABET.forEach(l => $("j2-" + l).disabled = true); changerTour();
    }
  }

  afficherMotDuo();
  if (finiJ1 && finiJ2) $("rejouer").style.display = "block";
}

function changerTour() {
  if (finiJ1 && finiJ2) return;
  if (finiJ1) joueurActuel = 2;
  else if (finiJ2) joueurActuel = 1;
  else joueurActuel = joueurActuel === 1 ? 2 : 1;

  $("cote-j1").classList.toggle("actif", joueurActuel === 1);
  $("cote-j2").classList.toggle("actif", joueurActuel === 2);

  ALPHABET.forEach(l => {
    const b1 = $("j1-" + l), b2 = $("j2-" + l);
    if (!b1.classList.contains("bonne") && !b1.classList.contains("mauvaise")) b1.disabled = joueurActuel !== 1;
    if (!b2.classList.contains("bonne") && !b2.classList.contains("mauvaise")) b2.disabled = joueurActuel !== 2;
  });
}

$("rejouer").onclick = function() {
  $("rejouer").style.display = "none";
  if (mode === 1) {
    $("jeu-solo").style.display = "none";
  } else {
    $("jeu-duo").style.display = "none";
  }
  lancerRoulette();
 };
</script>
